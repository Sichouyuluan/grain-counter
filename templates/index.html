<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Grain Detector - Low Bandwidth</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--card:#1a1d27;--border:#2a2d3a;--accent:#4ade80;--text:#e2e8f0;--dim:#94a3b8;--radius:12px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.header h1{font-size:18px;font-weight:600}
.header .badge{background:var(--accent);color:#000;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.conn-status{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;padding:4px 10px;border-radius:20px;background:var(--card);border:1px solid var(--border)}
.conn-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.conn-dot.online{background:#4ade80;box-shadow:0 0 6px #4ade80}
.conn-dot.offline{background:#f87171;box-shadow:0 0 6px #f87171}
.conn-dot.checking{background:#facc15;box-shadow:0 0 6px #facc15;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.main{flex:1;padding:16px;display:flex;flex-direction:column;gap:16px;max-width:1200px;width:100%;margin:0 auto}
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:40px 20px;text-align:center;cursor:pointer;transition:all .2s}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:rgba(74,222,128,.05)}
.upload-zone p{color:var(--dim);margin-top:8px;font-size:14px}
.upload-zone .icon{font-size:48px}
.btn{background:var(--accent);color:#000;border:none;padding:12px 24px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;width:100%;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.4;cursor:not-allowed}
.result-panel{display:none;gap:16px}
.result-panel.show{display:flex;flex-direction:column}
.stats{display:flex;gap:12px;flex-wrap:wrap}
.stat-card{flex:1;min-width:100px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.stat-card .num{font-size:28px;font-weight:700;color:var(--accent)}
.stat-card .label{font-size:12px;color:var(--dim);margin-top:4px}
.result-img{text-align:center}
.result-img img{width:100%;border-radius:8px;border:1px solid var(--border)}
.result-img .label{font-size:12px;color:var(--dim);text-align:center;margin-top:4px}
.loading{display:none;text-align:center;padding:40px}
.loading.show{display:block}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.status-text{font-size:13px;color:var(--dim);margin-top:8px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--card);color:var(--text);padding:10px 20px;border-radius:8px;font-size:13px;z-index:400;border:1px solid var(--border);box-shadow:0 4px 12px rgba(0,0,0,.3);display:none}
.toast.error{border-color:#f87171;color:#f87171}
.toast.success{border-color:var(--accent);color:var(--accent)}
.key-bar{padding:12px 16px;background:var(--card);border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center}
.key-bar input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:13px}
.key-bar button{background:var(--accent);color:#000;border:none;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}
.key-bar .status{font-size:12px;color:var(--accent)}
.key-bar.hidden{display:none}
.offline-overlay{display:none;position:fixed;top:0;left:0;right:0;z-index:300;background:#f87171;color:#fff;text-align:center;padding:10px;font-size:14px;font-weight:600}
.offline-overlay.show{display:block}
@media(max-width:600px){
  .stats{flex-direction:row}
  .stats .stat-card{min-width:0;flex:1;padding:12px 8px}
  .stats .stat-card .num{font-size:22px}
  .stats .stat-card .label{font-size:11px}
  .header h1{font-size:16px}
  .main{padding:12px}
  .upload-zone{padding:30px 16px}
}
@media(max-width:600px) and (orientation:landscape){
  .main{padding:8px 12px}
  .upload-zone{padding:16px}
  .stats{flex-direction:row}
}
.slider-group{display:flex;gap:16px;flex-wrap:wrap}
.slider-item{flex:1;min-width:200px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.slider-item .slider-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.slider-item .slider-label{font-size:13px;color:var(--dim)}
.slider-item .slider-value{font-size:14px;font-weight:700;color:var(--accent);min-width:40px;text-align:right}
.slider-item input[type=range]{width:100%;height:6px;-webkit-appearance:none;appearance:none;background:var(--border);border-radius:3px;outline:none;cursor:pointer}
.slider-item input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 6px rgba(74,222,128,.4)}
.slider-item input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--accent);cursor:pointer;border:none;box-shadow:0 0 6px rgba(74,222,128,.4)}
details.adv-settings{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
details.adv-settings>summary{padding:12px 16px;cursor:pointer;font-size:13px;color:var(--dim);user-select:none;list-style:none;display:flex;align-items:center;gap:8px}
details.adv-settings>summary::-webkit-details-marker{display:none}
details.adv-settings>summary::before{content:"\25B8";font-size:12px;transition:transform .2s}
details.adv-settings[open]>summary::before{transform:rotate(90deg)}
details.adv-settings>summary:hover{color:var(--text)}
details.adv-settings .slider-group{padding:0 16px 14px}
.progress-container{margin:12px 0;display:none}
.progress-container.show{display:block}
.progress-bar{width:100%;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .3s;width:0%}
.progress-text{font-size:12px;color:var(--dim);margin-top:4px;text-align:center}
.progress-text .speed{color:var(--accent);font-weight:600}
.retry-btn{background:#f87171;color:#fff;border:none;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;margin-top:12px;display:none}
.retry-btn.show{display:inline-block}
</style>
</head>
<body>
<div class="offline-overlay" id="offlineOverlay">&#9888; 服务器连接已断开，正在尝试重连...</div>
<div class="header">
  <span style="font-size:24px">&#127806;</span>
  <h1>小麦籽粒检测</h1>
  <span class="badge">YOLOv8</span>
  <div class="conn-status" id="connStatus">
    <span class="conn-dot checking" id="connDot"></span>
    <span id="connText">检测中...</span>
  </div>
</div>
<div class="key-bar" id="keyBar">
  <input type="password" id="keyInput" placeholder="输入 API Key">
  <button onclick="saveKey()">连接</button>
  <span class="status" id="keyStatus"></span>
</div>
<div class="main">
  <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <div class="icon">&#128247;</div>
    <p><b>点击上传</b> 或 拖拽图片到这里</p>
    <p>支持 JPG/PNG/BMP，最大 10MB</p>
    <p style="margin-top:6px;font-size:12px;color:var(--accent)">&#128161; 也可 Ctrl+V 粘贴图片</p>
  </div>
  <input type="file" id="fileInput" accept="image/*" style="display:none">
  <button class="btn" id="detectBtn" disabled onclick="detect()">开始检测</button>
  <div class="progress-container" id="uploadProgress">
    <div class="progress-bar"><div class="progress-fill" id="uploadFill"></div></div>
    <div class="progress-text" id="uploadText">上传中: 0%</div>
  </div>
  <div class="progress-container" id="downloadProgress">
    <div class="progress-bar"><div class="progress-fill" id="downloadFill"></div></div>
    <div class="progress-text" id="downloadText">下载中: 0%</div>
  </div>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p id="loadingText">推理中...</p>
    <div class="status-text" id="loadingDetail"></div>
  </div>
  <div class="result-panel" id="resultPanel">
    <div class="stats">
      <div class="stat-card"><div class="num" id="countNum">0</div><div class="label">籽粒数</div></div>
      <div class="stat-card"><div class="num" id="timeNum">0</div><div class="label">耗时 (ms)</div></div>
      <div class="stat-card"><div class="num" id="sizeNum">0</div><div class="label">图片尺寸</div></div>
    </div>
    <div class="result-img">
      <img id="resultImg" src="">
      <div class="label">检测结果</div>
    </div>
  </div>
  <button class="retry-btn" id="retryBtn" onclick="retryDetect()">重试检测</button>
  <details class="adv-settings" style="margin-top:12px">
    <summary>高级设置</summary>
    <div class="slider-group">
      <div class="slider-item">
        <div class="slider-header">
          <span class="slider-label">置信度阈值 (Confidence)</span>
          <span class="slider-value" id="confValue">0.25</span>
        </div>
        <input type="range" id="confSlider" min="0.01" max="1.0" step="0.01" value="0.25" oninput="document.getElementById('confValue').textContent=this.value">
      </div>
      <div class="slider-item">
        <div class="slider-header">
          <span class="slider-label">IoU 阈值 (覆盖度)</span>
          <span class="slider-value" id="iouValue">0.50</span>
        </div>
        <input type="range" id="iouSlider" min="0.01" max="1.0" step="0.01" value="0.50" oninput="document.getElementById('iouValue').textContent=this.value">
      </div>
    </div>
  </details>
</div>
<div class="toast" id="toast"></div>
<script>
var apiKey=localStorage.getItem('grain_api_key')||'';
var selectedFile=null;
var authDisabled=false;
var serverOnline=false;
var heartbeatTimer=null;
var retryCount=0;
var MAX_RETRIES=3;
function $(id){return document.getElementById(id)}

/* ========== 图片压缩 ========== */
function compressImage(file,maxWidth,quality){
  maxWidth=maxWidth||1920;
  quality=quality||0.85;
  return new Promise(function(resolve){
    if(file.size<500*1024){resolve(file);return}
    var reader=new FileReader();
    reader.onload=function(e){
      var img=new Image();
      img.onload=function(){
        var canvas=document.createElement('canvas');
        var w=img.width,h=img.height;
        if(w>maxWidth){h=h*maxWidth/w;w=maxWidth}
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        canvas.toBlob(function(blob){
          if(blob.size>=file.size){resolve(file)}
          else{resolve(new File([blob],file.name,{type:'image/jpeg',lastModified:Date.now()}))}
        },'image/jpeg',quality);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ========== 连接状态 ========== */
function setConnState(state,detail){
  var dot=$('connDot'),text=$('connText'),overlay=$('offlineOverlay');
  dot.className='conn-dot';
  if(state==='online'){dot.classList.add('online');text.textContent='已连接';text.style.color='#4ade80';overlay.classList.remove('show');serverOnline=true}
  else if(state==='offline'){dot.classList.add('offline');text.textContent='未连接';text.style.color='#f87171';overlay.classList.add('show');serverOnline=false}
  else{dot.classList.add('checking');text.textContent=detail||'检测中...';text.style.color='#facc15'}
}

function pingServer(){
  return new Promise(function(resolve){
    var ctrl=new AbortController();
    var tid=setTimeout(function(){ctrl.abort()},5000);
    fetch('/api/ping',{signal:ctrl.signal}).then(function(r){
      clearTimeout(tid);
      if(r.ok){return r.json().then(function(d){if(d.auth===false)authDisabled=true;setConnState('online');resolve(true)})}
      setConnState('offline');resolve(false);
    }).catch(function(){clearTimeout(tid);setConnState('offline');resolve(false)});
  });
}

function startHeartbeat(){pingServer();heartbeatTimer=setInterval(pingServer,5000)}

/* ========== Toast ========== */
function toast(msg,type){
  var t=$('toast');t.textContent=msg;t.className='toast';
  if(type==='error')t.classList.add('error');else if(type==='success')t.classList.add('success');
  t.style.display='block';setTimeout(function(){t.style.display='none'},3000);
}

/* ========== API Key ========== */
fetch('/api/health').then(function(r){return r.json()}).then(function(d){
  if(d.auth===false){authDisabled=true;$('keyBar').classList.add('hidden')}
}).catch(function(){});
if(apiKey){$('keyInput').value='***';$('keyStatus').textContent='已连接';$('keyStatus').style.color='var(--accent)'}
function saveKey(){
  apiKey=$('keyInput').value.trim();
  if(!apiKey){toast('请输入 API Key','error');return}
  localStorage.setItem('grain_api_key',apiKey);
  $('keyStatus').textContent='Key 已保存';$('keyStatus').style.color='var(--accent)';
  toast('Key 已保存','success');
}

/* ========== 文件选择 ========== */
$('fileInput').addEventListener('change',function(e){if(e.target.files[0])handleFile(e.target.files[0])});
var dz=$('dropZone');
dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('drag')});
dz.addEventListener('dragleave',function(){dz.classList.remove('drag')});
dz.addEventListener('drop',function(e){e.preventDefault();dz.classList.remove('drag');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0])});

function handleFile(f){
  if(!f.type.startsWith('image/')){toast('请上传图片文件','error');return}
  if(f.size>10*1024*1024){toast('文件过大，最大 10MB','error');return}
  selectedFile=f;toast('已选择: '+f.name,'success');$('detectBtn').disabled=false;
}

/* ========== 进度条 ========== */
function showUploadProgress(show){$('uploadProgress').classList.toggle('show',show);if(!show){$('uploadFill').style.width='0%';$('uploadText').textContent='上传中: 0%'}}
function updateUploadProgress(pct,speed){$('uploadFill').style.width=pct+'%';var t='上传中: '+pct+'%';if(speed)t+=' <span class="speed">'+speed+'</span>';$('uploadText').innerHTML=t}
function showDownloadProgress(show){$('downloadProgress').classList.toggle('show',show);if(!show){$('downloadFill').style.width='0%';$('downloadText').textContent='下载中: 0%'}}
function updateDownloadProgress(pct,speed){$('downloadFill').style.width=pct+'%';var t='下载中: '+pct+'%';if(speed)t+=' <span class="speed">'+speed+'</span>';$('downloadText').innerHTML=t}

function formatSize(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB'}
function formatSpeed(bps){if(bps<1024)return bps.toFixed(0)+'B/s';if(bps<1048576)return(bps/1024).toFixed(1)+'KB/s';return(bps/1048576).toFixed(1)+'MB/s'}

/* ========== 检测 ========== */
function detect(){
  if(!selectedFile){toast('请先选择图片','error');return}
  if(!authDisabled&&!apiKey){toast('请先输入 API Key','error');return}
  if(!serverOnline){toast('服务器未连接，请稍后重试','error');return}

  $('detectBtn').disabled=true;$('retryBtn').classList.remove('show');
  $('resultPanel').classList.remove('show');$('loading').classList.add('show');
  $('loadingText').textContent='正在压缩图片...';
  $('loadingDetail').textContent=selectedFile.name+' ('+formatSize(selectedFile.size)+')';

  compressImage(selectedFile).then(function(compressedFile){
    $('loadingText').textContent='正在上传...';
    $('loadingDetail').textContent='压缩后: '+formatSize(compressedFile.size)+' (原始: '+formatSize(selectedFile.size)+')';
    return uploadWithProgress(compressedFile);
  }).then(function(result){
    $('loadingText').textContent='正在加载结果...';
    $('loadingDetail').textContent='模型处理中，请稍候';
    $('countNum').textContent=result.count;
    $('timeNum').textContent=result.elapsed_ms;
    $('sizeNum').textContent=result.image_size.width+'\u00D7'+result.image_size.height;
    $('resultImg').src=result.result_image;
    $('resultPanel').classList.add('show');
    toast('检测完成: '+result.count+' 粒','success');
    retryCount=0;
  }).catch(function(e){
    console.error('检测失败:',e);
    if(retryCount<MAX_RETRIES){toast('检测失败，'+(MAX_RETRIES-retryCount)+' 次重试机会，点击重试按钮','error');$('retryBtn').classList.add('show')}
    else{toast('检测失败，已达最大重试次数','error')}
  }).finally(function(){
    $('loading').classList.remove('show');$('detectBtn').disabled=false;
    showUploadProgress(false);showDownloadProgress(false);
  });
}

function retryDetect(){retryCount++;detect()}

/* ========== 上传 with 进度(XHR) ========== */
function uploadWithProgress(file){
  return new Promise(function(resolve,reject){
    var xhr=new XMLHttpRequest();
    var fd=new FormData();fd.append('file',file);
    var conf=document.getElementById('confSlider').value;
    var iou=document.getElementById('iouSlider').value;
    xhr.open('POST','/api/detect?conf='+conf+'&iou='+iou);
    if(!authDisabled&&apiKey)xhr.setRequestHeader('Authorization','Bearer '+apiKey);

    var t0=Date.now();
    xhr.upload.onprogress=function(e){
      if(e.lengthComputable){
        var pct=Math.round(e.loaded/e.total*100);
        var spd=(Date.now()-t0)>0?formatSpeed(e.loaded/((Date.now()-t0)/1000)):'';
        updateUploadProgress(pct,spd);
      }
    };
    xhr.onprogress=function(e){
      if(e.lengthComputable){
        var pct=Math.round(e.loaded/e.total*100);
        var spd=(Date.now()-t0)>0?formatSpeed(e.loaded/((Date.now()-t0)/1000)):'';
        updateDownloadProgress(pct,spd);
      }
    };
    xhr.onload=function(){
      if(xhr.status>=200&&xhr.status<300){
        try{resolve(JSON.parse(xhr.responseText))}catch(ex){reject(new Error('解析响应失败'))}
      }else{
        var errMsg='检测失败';
        try{var ej=JSON.parse(xhr.responseText);errMsg=ej.detail||errMsg}catch(_){}
        if(xhr.status===401)errMsg='API Key 无效，请检查';
        else if(xhr.status===403)errMsg='API Key 错误';
        else if(xhr.status===429)errMsg='请求过于频繁，请稍后再试';
        reject(new Error(errMsg));
      }
    };
    xhr.onerror=function(){reject(new Error('网络错误，请检查连接'))};
    xhr.ontimeout=function(){reject(new Error('请求超时，请检查网络'))};
    xhr.timeout=240000;
    showUploadProgress(true);showDownloadProgress(true);
    xhr.send(fd);
  });
}

/* ========== 粘贴 ========== */
document.addEventListener('paste',function(e){
  var items=e.clipboardData&&e.clipboardData.items;if(!items)return;
  for(var i=0;i<items.length;i++){if(items[i].type.startsWith('image/')){handleFile(items[i].getAsFile());break}}
});

/* ========== 启动 ========== */
startHeartbeat();
</script>
</body>
</html>
